name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: '.'
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
      - name: Restore NuGet
        run: nuget restore "Malis Grid Navigator.sln"
      - name: Build
        run: msbuild "Malis Grid Navigator.sln" /p:Configuration=Release
      - name: Write version file
        run: echo ${{ github.ref_name }} > "bin/Release/GridNavigator.version"
      - name: Package release DLL
        run: |
          mkdir -p Release
          Compress-Archive -Path "bin/Release/*" -DestinationPath "Release/GridNavigator-${{ github.ref_name }}.zip"
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: Release/GridNavigator-${{ github.ref_name }}.zip